name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios-ipa:
    name: Build ArcReader Custom IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate iOS Platform Project
        run: flutter create --platforms=ios --org com.webnovel --project-name arcreader .

      - name: Inject Manual Signing & Dummy Development Team
        run: |
          python3 -c "
          import re
          pbx_path = 'ios/Runner.xcodeproj/project.pbxproj'
          with open(pbx_path, 'r') as f:
              content = f.read()

          # Switch to manual code signing and inject dummy 10-char team ID
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;\n\t\t\t\tDEVELOPMENT_TEAM = \"1234567890\";\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGN_IDENTITY = \"\";')
          content = re.sub(r'buildSettings\s*=\s*\{', 'buildSettings = {\n\t\t\t\tDEVELOPMENT_TEAM = \"1234567890\";\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;', content)

          with open(pbx_path, 'w') as f:
              f.write(content)
          print('Successfully injected manual code signing and dummy team ID into project.pbxproj.')
          "

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Test Suite
        run: python3 test/run_tests.py

      - name: Build Unsigned iOS App via xcodebuild
        run: |
          flutter build ios --release --no-codesign --config-only
          xcodebuild -workspace ios/Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build/ios \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGN_ENTITLEMENTS="" \
                     DEVELOPMENT_TEAM="1234567890" \
                     build
          cd build/ios/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r ArcReader-Custom-v1.0.31.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcReader-Custom-v1.0.31-IPA
          path: build/ios/Build/Products/Release-iphoneos/ArcReader-Custom-v1.0.31.ipa
          retention-days: 14
