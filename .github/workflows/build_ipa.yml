name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios-ipa:
    name: Build ArcReader Custom IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate iOS Platform Project
        run: flutter create --platforms=ios --org com.webnovel --project-name arcreader .

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Test Suite
        run: python3 test/run_tests.py

      - name: Build iOS App & Package Unsigned IPA
        run: |
          flutter build ios --release --no-codesign --config-only || true
          xcodebuild -workspace ios/Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build/ios \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGN_ENTITLEMENTS="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     build
          cd build/ios/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r ArcReader-Custom-v1.0.31.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcReader-Custom-v1.0.31-IPA
          path: build/ios/Build/Products/Release-iphoneos/ArcReader-Custom-v1.0.31.ipa
          retention-days: 14
