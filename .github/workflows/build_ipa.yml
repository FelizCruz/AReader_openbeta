name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios-ipa:
    name: Build ArcReader Custom IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate iOS Platform Project
        run: flutter create --platforms=ios --org com.webnovel --project-name arcreader .

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Test Suite
        run: python3 test/run_tests.py

      - name: Build iOS Application (Unsigned IPA)
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -r ArcReader-Custom-v1.0.31.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcReader-Custom-v1.0.31-IPA
          path: build/ios/iphoneos/ArcReader-Custom-v1.0.31.ipa
          retention-days: 14
