name: arcreader_custom
description: Custom ArcReader web novel reader with developer features.
publish_to: 'none'
version: 1.0.31+43

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.3.7
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/branding/app_icon.png
    - assets/welcome_novel/
    - assets/welcome_novel/img/
    - assets/welcome_novel/manifest.json

  shaders:
    - shaders/ink_sparkle.frag
    - shaders/stretch_effect.frag

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

    - family: Newsreader
      fonts:
        - asset: assets/fonts/Newsreader-Regular.ttf
        - asset: assets/fonts/Newsreader-Medium.ttf
          weight: 500
        - asset: assets/fonts/Newsreader-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Newsreader-Bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
